name: Flutter Build Main

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      - uses: SpicyPizza/create-envfile@v2.0
        with:
          envkey_PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
      - run: flutter pub get
      - name: Run tests
        run: flutter test test/core/ test/features/ test/l10n/

  version-bump:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.bump.outputs.commit_sha }}
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump patch version
        id: bump
        run: |
          CURRENT_VERSION=$(grep -E "^version:" pubspec.yaml | sed 's/version: //')
          VERSION_PART=$(echo "$CURRENT_VERSION" | cut -d'+' -f1)
          MAJOR=$(echo "$VERSION_PART" | cut -d'.' -f1)
          MINOR=$(echo "$VERSION_PART" | cut -d'.' -f2)
          PATCH=$(echo "$VERSION_PART" | cut -d'.' -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}+1"

          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git tag -a "v$NEW_VERSION" -m "Release $NEW_VERSION"
          git push && git push --tags

          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: [test, version-bump]
    if: ${{ !cancelled() && needs.test.result == 'success' && needs.version-bump.result != 'failure' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.commit_sha || github.sha }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      - uses: SpicyPizza/create-envfile@v2.0
        with:
          envkey_PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
      - name: Ensure platform directories exist
        run: flutter create --platforms=windows --org com.example . || true
      - run: flutter clean || true
      - run: flutter pub get
      - run: flutter pub outdated || true
      - name: Fix speech_to_text_windows include guard collision with local_auth_windows
        shell: pwsh
        run: |
          $header = "windows/flutter/ephemeral/.plugin_symlinks/speech_to_text_windows/windows/include/speech_to_text_windows/speech_to_text_windows.h"
          if (Test-Path $header) {
            (Get-Content $header) -replace 'FLUTTER_PLUGIN_LOCAL_AUTH_WINDOWS_PLUGIN_H_', 'FLUTTER_PLUGIN_SPEECH_TO_TEXT_WINDOWS_H_' | Set-Content $header
          }
      - run: flutter build windows --release --no-tree-shake-icons
      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: build/windows/x64/runner/Release/

  build-linux:
    needs: [test, version-bump]
    if: ${{ !cancelled() && needs.test.result == 'success' && needs.version-bump.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.commit_sha || github.sha }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      - uses: SpicyPizza/create-envfile@v2.0
        with:
          envkey_PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev
      - name: Ensure platform directories exist
        run: flutter create --platforms=linux --org com.example . || true
      - run: flutter clean || true
      - run: flutter pub get
      - run: flutter pub outdated || true
      - run: flutter build linux --release --no-tree-shake-icons
      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: build/linux/x64/release/bundle/

  build-android:
    needs: [test, version-bump]
    if: ${{ !cancelled() && needs.test.result == 'success' && needs.version-bump.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.commit_sha || github.sha }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      - uses: SpicyPizza/create-envfile@v2.0
        with:
          envkey_PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
      - name: Ensure platform directories exist
        run: flutter create --platforms=android --org com.example . || true
      - run: flutter clean || true
      - run: flutter pub get
      - run: flutter pub outdated || true
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons
      - name: Build App Bundle
        run: flutter build appbundle --release --no-tree-shake-icons
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
